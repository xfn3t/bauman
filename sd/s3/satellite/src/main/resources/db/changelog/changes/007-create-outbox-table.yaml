databaseChangeLog:
  - changeSet:
      id: 007-create-outbox-table
      author: system
      changes:
        - createTable:
            tableName: outbox
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(16)
                  defaultValue: 'PENDING'
                  constraints:
                    nullable: false
        - createIndex:
            tableName: outbox
            indexName: idx_outbox_status
            columns:
              - column:
                  name: status
