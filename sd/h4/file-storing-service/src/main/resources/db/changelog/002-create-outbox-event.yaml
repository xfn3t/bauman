databaseChangeLog:
  - changeSet:
      id: 002-create-outbox-event
      author: xfnet
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: outbox_event
      changes:
        - createTable:
            tableName: outbox_event
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: published
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - createIndex:
            tableName: outbox_event
            indexName: idx_outbox_published_created
            columns:
              - column:
                  name: published
              - column:
                  name: created_at
