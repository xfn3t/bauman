databaseChangeLog:
  - changeSet:
      id: 001-create-inbox-table
      author: system
      changes:
        - createTable:
            tableName: inbox
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_id
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: aggregate_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(32)
                  constraints:
                    nullable: false
              - column:
                  name: processed_at
                  type: TIMESTAMP WITHOUT TIME ZONE
                  constraints:
                    nullable: false
