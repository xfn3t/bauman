spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      routes:
        - id: storing-service
          uri: ${STORING_SERVICE_URL}
          predicates:
            - Path=/api/v1/works/**
        - id: analysis-service
          uri: ${ANALYSIS_SERVICE_URL}
          predicates:
            - Path=/api/v1/works/*/reports

server:
  port: 8080
