databaseChangeLog:
  - changeSet:
      id: 001-create-work-submission
      author: xfnet
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: work_submission
      changes:
        - createTable:
            tableName: work_submission
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: student_name
                  type: varchar(512)
                  constraints:
                    nullable: false
              - column:
                  name: file_name
                  type: varchar(512)
                  constraints:
                    nullable: false
              - column:
                  name: file_size
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: s3_key
                  type: varchar(1024)
              - column:
                  name: submitted_at
                  type: timestamp with time zone
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: analysis_triggered
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
