services:
  postgres:
    image: postgres:15-alpine
    container_name: seminar-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - seminar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./satellite
      dockerfile: Dockerfile
    container_name: seminar-app
    ports:
      - "8080:8080"
    env_file:
      - satellite/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - seminar-network

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: mission-scheduler
    ports:
      - "8081:8081"
    env_file:
      - scheduler/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - seminar-network

volumes:
  postgres_data:

networks:
  seminar-network:
    driver: bridge