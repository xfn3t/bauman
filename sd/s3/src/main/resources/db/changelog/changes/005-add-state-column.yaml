databaseChangeLog:
  - changeSet:
      id: 005-add-state-column
      author: system
      changes:
        - addColumn:
            tableName: satellites
            columns:
              - column:
                  name: state
                  type: varchar(20)
                  constraints:
                    nullable: true

        - sql:
            sql: >
              UPDATE satellites 
              SET state = CASE WHEN active = true THEN 'ACTIVE' ELSE 'INACTIVE' END

        - addNotNullConstraint:
            tableName: satellites
            columnName: state
            columnDataType: varchar(20)

        - dropColumn:
            tableName: satellites
            columnName: active