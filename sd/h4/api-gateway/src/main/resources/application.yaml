spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: storing-service
          uri: ${STORING_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/works/**
        - id: analysis-service
          uri: ${ANALYSIS_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/works/*/reports
        - id: storing-openapi
          uri: ${STORING_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/v3/api-docs/file-storing-service
        - id: analysis-openapi
          uri: ${ANALYSIS_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/v3/api-docs/file-analysis-service

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    urls:
      - name: File Storing Service
        url: /v3/api-docs/file-storing-service
      - name: File Analysis Service
        url: /v3/api-docs/file-analysis-service
