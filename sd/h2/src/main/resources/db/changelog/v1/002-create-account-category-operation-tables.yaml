databaseChangeLog:
  - changeSet:
      id: 2
      author: tiger
      changes:
        - createTable:
            tableName: bank_account
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
        - createTable:
            tableName: category
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: category_type_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_category_type
                    references: category_type(id)
        - createTable:
            tableName: operation
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(1000)
              - column:
                  name: operation_type_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_operation_type
                    references: operation_type(id)
              - column:
                  name: bank_account_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bank_account
                    references: bank_account(id)
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_category
                    references: category(id)